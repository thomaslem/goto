name: NuGet

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  pack-push:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack --configuration Release

      - name: Push
        run: dotnet nuget push ./artifacts/package/release/ --source "https://nuget.pkg.github.com/thomaslem/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
